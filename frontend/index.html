<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management Portal</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>Student Management Portal</h1>
                <p>Welcome back! Please enter your details.</p>
            </div>
            
            <form id="loginForm" novalidate>
                <div class="error-banner" id="serverError" style="display: none;"></div>
                
                <div class="form-group role-selection">
                    <label class="radio-label">
                        <input type="radio" name="role" value="student" checked>
                        <span>Student</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="role" value="admin">
                        <span>Admin</span>
                    </label>
                </div>

                <div class="form-group">
                    <label for="username">Username / Roll No</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username">
                    <span class="inline-error" id="usernameError" style="display: none;">Username cannot be empty</span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password">
                    <span class="inline-error" id="passwordError" style="display: none;">Password cannot be empty</span>
                </div>

                <button type="submit" id="loginBtn" class="btn-primary">
                    <span id="btnText">Sign In</span>
                    <span id="btnLoader" class="loader" style="display: none;">Signing In...</span>
                </button>
            </form>
        </div>
    </div>
    
    <script src="js/login.js"></script>
</body>
</html>
